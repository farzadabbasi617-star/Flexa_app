name: Sync Telegram bot configuration

on:
  schedule:
    # Keep private/group command scopes and descriptions aligned with the app.
    - cron: "23 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: telegram-bot-configuration
  cancel-in-progress: true

jobs:
  sync:
    name: Sync Flexa commands and group scope
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: Apply production Telegram configuration
        env:
          SETUP_SECRET: ${{ secrets.TELEGRAM_CRON_SECRET }}
          CRON_URL: ${{ secrets.TELEGRAM_CRON_URL }}
        run: |
          set -euo pipefail
          test -n "$SETUP_SECRET" || { echo "TELEGRAM_CRON_SECRET is missing"; exit 1; }
          test -n "$CRON_URL" || { echo "TELEGRAM_CRON_URL is missing"; exit 1; }
          case "$CRON_URL" in https://*.onrender.com/api/telegram/cron) ;; *) echo "Invalid Render cron URL"; exit 1;; esac
          SETUP_URL="${CRON_URL%/api/telegram/cron}/api/telegram/setup"
          status="$(curl --silent --show-error --retry 2 --retry-all-errors --max-time 150 \
            -o /tmp/telegram-setup.json -w '%{http_code}' \
            -X POST \
            -H "Authorization: Bearer $SETUP_SECRET" \
            -H "Content-Type: application/json" \
            -H "User-Agent: Gament-Telegram-Config/1.0" \
            --data '{"setWebhook":false}' \
            "$SETUP_URL")"
          if [ "$status" != "200" ]; then
            echo "Telegram setup returned HTTP $status"
            head -c 2000 /tmp/telegram-setup.json
            exit 1
          fi
          jq -e '.ok == true' /tmp/telegram-setup.json >/dev/null
          jq -c '{botInfo:.results.botInfo.result,commandsDefault:.results.commandsDefault.ok,commandsAllPrivate:.results.commandsAllPrivate.ok,commandsAllGroups:.results.commandsAllGroups.ok}' /tmp/telegram-setup.json
