name: Telegram automation cron

on:
  schedule:
    # GitHub scheduled workflows have a five-minute minimum interval.
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: telegram-automation-cron
  cancel-in-progress: true

jobs:
  run:
    name: Run Gament scheduled automation
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Call protected production cron
        env:
          CRON_SECRET: ${{ secrets.TELEGRAM_CRON_SECRET }}
        run: |
          test -n "$CRON_SECRET" || { echo "TELEGRAM_CRON_SECRET repository secret is missing"; exit 1; }
          status="$(curl --silent --show-error \
            --retry 2 --retry-all-errors --max-time 90 \
            -o /tmp/gament-cron-response.json -w '%{http_code}' \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Accept: application/json" \
            -H "User-Agent: Mozilla/5.0 (compatible; GamentAutomation/1.0; +https://www.gament1.ir)" \
            https://www.gament1.ir/api/telegram/cron)"
          if [ "$status" != "200" ]; then
            echo "Gament cron returned HTTP $status"
            head -c 1000 /tmp/gament-cron-response.json
            exit 1
          fi
          jq -e '.ok == true' /tmp/gament-cron-response.json >/dev/null
          echo "Gament cron completed successfully"
