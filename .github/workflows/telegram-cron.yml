name: Telegram automation cron

on:
  schedule:
    # GitHub scheduled workflows have a five-minute minimum interval.
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: telegram-automation-cron
  cancel-in-progress: true

jobs:
  run:
    name: Run Gament scheduled automation
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: Call protected production cron
        env:
          CRON_SECRET: ${{ secrets.TELEGRAM_CRON_SECRET }}
          CRON_URL: ${{ secrets.TELEGRAM_CRON_URL }}
        run: |
          test -n "$CRON_SECRET" || { echo "TELEGRAM_CRON_SECRET repository secret is missing"; exit 1; }
          test -n "$CRON_URL" || { echo "TELEGRAM_CRON_URL repository secret is missing"; exit 1; }
          case "$CRON_URL" in https://*.onrender.com/api/telegram/cron) ;; *) echo "TELEGRAM_CRON_URL must be the Render origin cron URL"; exit 1;; esac
          status="$(curl --silent --show-error \
            --retry 2 --retry-all-errors --max-time 150 \
            -o /tmp/gament-cron-response.json -w '%{http_code}' \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Accept: application/json" \
            -H "User-Agent: Gament-GitHub-Cron/1.0" \
            "$CRON_URL")"
          if [ "$status" != "200" ]; then
            echo "Gament cron returned HTTP $status"
            head -c 1000 /tmp/gament-cron-response.json
            exit 1
          fi
          jq -e '.ok == true' /tmp/gament-cron-response.json >/dev/null
          echo "Gament cron completed successfully"
          echo "Gaming news result:"
          jq -c '.dailyGamingNews' /tmp/gament-cron-response.json
