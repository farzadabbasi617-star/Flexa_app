<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>چت و پشتیبانی فلکسا</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #050508; color: #fff; font-family: 'Vazirmatn', sans-serif; margin: 0; }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); }
        .chat-bubble { max-width: 80%; padding: 12px 16px; border-radius: 20px; font-size: 13px; line-height: 1.6; }
        .bubble-me { background: linear-gradient(135deg, #bc00ff 0%, #7000ff 100%); border-bottom-left-radius: 4px; align-self: flex-start; }
        .bubble-other { background: rgba(255,255,255,0.05); border-bottom-right-radius: 4px; align-self: flex-end; }
        .strike-pill { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: 900; }
    </style>
</head>
<body class="max-w-[480px] mx-auto min-h-screen flex flex-col">

    <!-- بخش چت زنده (EPHEMERAL) -->
    <header class="p-6 border-b border-white/5 flex justify-between items-center">
        <div>
            <h1 class="text-xl font-black tracking-tighter">چت جهانی <span class="text-purple-500">●</span></h1>
            <p class="text-[9px] text-gray-500 font-bold">فقط ۵۰ پیام آخر نمایش داده می‌شود</p>
        </div>
        <div class="strike-pill">اخطار: ۰ از ۳</div>
    </header>

    <div class="flex-1 overflow-y-auto p-6 flex flex-col gap-4">
        <!-- پیام سیستم -->
        <div class="bg-blue-500/10 border border-blue-500/20 p-3 rounded-2xl text-[10px] text-blue-400 text-center">
            🤖 هوش مصنوعی فلکسا ناظر این چت است. رعایت ادب الزامی است.
        </div>

        <!-- پیام دیگران -->
        <div class="flex flex-col gap-1 bubble-other">
            <span class="text-[9px] font-black text-gray-500 mb-1">ShadowNinja</span>
            <div class="chat-bubble">کسی هست برای کلش رویال الان؟ ⚔️</div>
        </div>

        <!-- پیام من -->
        <div class="flex flex-col gap-1 bubble-me">
            <div class="chat-bubble text-white">من هستم، ۱۰ دقیقه دیگه بیا توی لابی.</div>
        </div>

        <!-- پیام حذف شده توسط AI -->
        <div class="border border-red-500/30 bg-red-500/5 p-3 rounded-2xl text-[10px] text-red-400 text-center italic">
            🚫 این پیام به دلیل استفاده از کلمات نامناسب توسط AI حذف شد.
        </div>
    </div>

    <!-- ورودی چت -->
    <div class="p-4 bg-black/40 backdrop-blur-xl border-t border-white/5">
        <div class="flex gap-2 bg-white/5 p-2 rounded-[25px] border border-white/10">
            <input type="text" placeholder="پیام خود را بنویسید..." class="flex-1 bg-transparent outline-none px-4 text-sm">
            <button class="w-10 h-10 bg-purple-600 rounded-full flex items-center justify-center text-lg">🚀</button>
        </div>
    </div>

    <!-- دکمه تیکت پشتیبانی (Floating) -->
    <button class="fixed bottom-32 left-6 w-14 h-14 bg-blue-600 rounded-full shadow-2xl border-4 border-[#050508] flex items-center justify-center text-xl z-50">
        🎧
    </button>

</body>
</html>
