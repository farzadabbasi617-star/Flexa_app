services:
  - type: web
    name: gament
    env: node
    plan: free
    # Schema changes are applied as reviewed migrations, never implicitly during every build.
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: ADMIN_SETUP_SECRET
        sync: false
      - key: OTP_TOKEN_PEPPER
        sync: false
      - key: CLASH_ROYALE_API_TOKEN
        sync: false
      - key: CLASH_ROYALE_API_BASE_URL
        value: https://proxy.royaleapi.dev/v1
      - key: EMAIL_PROVIDER
        value: google_apps_script
      - key: GOOGLE_APPS_SCRIPT_EMAIL_URL
        sync: false
      - key: GOOGLE_APPS_SCRIPT_EMAIL_SECRET
        sync: false
      - key: BOT_TOKEN
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false
      - key: TELEGRAM_ADMIN_IDS
        sync: false
      - key: TELEGRAM_CHANNEL_URL
        value: https://t.me/Gament_games
      - key: TELEGRAM_CHANNEL_ID
        value: '@Gament_games'
      - key: TELEGRAM_BOT_USERNAME
        value: FlexaTournamentBot
      - key: TELEGRAM_CRON_SECRET
        sync: false
      - key: TELEGRAM_SETUP_SECRET
        sync: false
      - key: TELEGRAM_REQUIRE_CHANNEL_MEMBERSHIP
        value: 'true'
      - key: TELEGRAM_INTEGRATION_SECRET
        sync: false
      - key: GAMING_NEWS_TELEGRAM_CHANNELS
        sync: false
      - key: GAMING_NEWS_MAX_PER_RUN
        value: '4'
      - key: AFFILIATE_PROGRAM_LIVE
        value: 'false'
      - key: AFFILIATE_ATTRIBUTION_DAYS
        value: '30'
      - key: AFFILIATE_COMMISSION_TOMAN
        value: '7000'
      - key: AFFILIATE_HOLD_HOURS
        value: '72'
      - key: AFFILIATE_MINIMUM_PAYOUT_TOMAN
        value: '300000'
      - key: PERSONAL_REFERRAL_MINIMUM_PAYOUT_TOMAN
        value: '200000'
      - key: FARAZSMS_API_KEY
        sync: false
      - key: FARAZSMS_PATTERN_CODE
        sync: false
      - key: FARAZSMS_SENDER
        sync: false
