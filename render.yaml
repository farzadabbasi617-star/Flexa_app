services:
  - type: web
    name: gament
    env: node
    plan: free
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: BOT_TOKEN
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false
      - key: TELEGRAM_ADMIN_IDS
        sync: false
      - key: TELEGRAM_CHANNEL_URL
        value: https://t.me/Gament_games
      - key: TELEGRAM_CHANNEL_ID
        value: '@Gament_games'
      - key: TELEGRAM_BOT_USERNAME
        value: FlexaTournamentBot
      - key: TELEGRAM_CRON_SECRET
        sync: false
      - key: TELEGRAM_REQUIRE_CHANNEL_MEMBERSHIP
        value: 'false'
      - key: TELEGRAM_INTEGRATION_SECRET
        sync: false
      - key: PAYPING_TOKEN
        sync: false
      - key: PAYPING_CALLBACK_URL
        value: https://www.gament1.ir/api/payment/payping/callback
      - key: FARAZSMS_API_KEY
        sync: false
      - key: FARAZSMS_PATTERN_CODE
        sync: false
      - key: FARAZSMS_SENDER
        sync: false
